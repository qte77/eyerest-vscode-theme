<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="sun3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8D040"/>
      <stop offset="40%" stop-color="#E89030"/>
      <stop offset="100%" stop-color="#C48E8E"/>
    </linearGradient>
    <radialGradient id="sunGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8A468" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1F1B22" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sky3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A2630"/>
      <stop offset="100%" stop-color="#1F1B22"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#sky3)"/>
  <!-- Sun glow -->
  <circle cx="128" cy="130" r="60" fill="url(#sunGlow3)"/>
  <!-- Sun (half circle above horizon) -->
  <clipPath id="horizon3">
    <rect x="0" y="0" width="256" height="130"/>
  </clipPath>
  <circle cx="128" cy="130" r="36" fill="url(#sun3)" clip-path="url(#horizon3)"/>
  <!-- Horizon line -->
  <line x1="40" y1="130" x2="216" y2="130" stroke="#C8A468" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Horizon reflection lines -->
  <line x1="70" y1="142" x2="186" y2="142" stroke="#C8A468" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="90" y1="152" x2="166" y2="152" stroke="#C8A468" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
  <!-- Text -->
  <text x="128" y="200" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="28" fill="#D8CCBC" letter-spacing="4">EyeRest</text>
</svg>
