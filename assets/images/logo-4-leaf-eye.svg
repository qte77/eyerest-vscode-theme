<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="leaf4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90B088"/>
      <stop offset="50%" stop-color="#A8D4A2"/>
      <stop offset="100%" stop-color="#80B0A8"/>
    </linearGradient>
    <linearGradient id="eyeOutline4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C8A468"/>
      <stop offset="100%" stop-color="#C48E8E"/>
    </linearGradient>
    <radialGradient id="leafGlow4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#90B088" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1F1B22" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#1F1B22"/>
  <!-- Soft glow behind eye -->
  <ellipse cx="128" cy="115" rx="80" ry="55" fill="url(#leafGlow4)"/>
  <!-- Eye shape (softer, rounder almond) -->
  <path d="M 48 115 Q 128 65 208 115 Q 128 165 48 115 Z" fill="#2A2630" stroke="url(#eyeOutline4)" stroke-width="2"/>
  <!-- Leaf as iris -->
  <g transform="translate(128,115)">
    <!-- Leaf shape — rounder, friendly -->
    <path d="M 0 -24 Q 20 -12 20 2 Q 18 18 0 26 Q -18 18 -20 2 Q -20 -12 0 -24 Z" fill="url(#leaf4)" opacity="0.85"/>
    <!-- Leaf vein (center) -->
    <line x1="0" y1="-18" x2="0" y2="20" stroke="#2A2630" stroke-width="1.2" opacity="0.4"/>
    <!-- Leaf veins (sides) — gentle curves -->
    <path d="M 0 -8 Q 6 -4 10 0" fill="none" stroke="#2A2630" stroke-width="0.8" opacity="0.25"/>
    <path d="M 0 -8 Q -6 -4 -10 0" fill="none" stroke="#2A2630" stroke-width="0.8" opacity="0.25"/>
    <path d="M 0 4 Q 7 7 11 10" fill="none" stroke="#2A2630" stroke-width="0.8" opacity="0.25"/>
    <path d="M 0 4 Q -7 7 -11 10" fill="none" stroke="#2A2630" stroke-width="0.8" opacity="0.25"/>
    <!-- Pupil — small dark circle -->
    <circle cx="0" cy="1" r="7" fill="#1F1B22" opacity="0.8"/>
    <!-- Highlight in pupil -->
    <circle cx="-2" cy="-1" r="2.5" fill="#D8CCBC" opacity="0.6"/>
  </g>
  <!-- Text -->
  <text x="128" y="195" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="28" fill="#D8CCBC" letter-spacing="4">EyeRest</text>
</svg>
