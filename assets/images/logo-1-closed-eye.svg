<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#C8A468" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1F1B22" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lid1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#90B088"/>
      <stop offset="50%" stop-color="#C8A468"/>
      <stop offset="100%" stop-color="#C48E8E"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#1F1B22"/>
  <!-- Warm glow centered on the eye -->
  <ellipse cx="128" cy="120" rx="75" ry="55" fill="url(#glow1)"/>
  <!-- Closed eyelid - upper curve -->
  <path d="M 48 120 Q 128 80 208 120" fill="none" stroke="url(#lid1)" stroke-width="5" stroke-linecap="round"/>
  <!-- Closed eyelid - lower curve (subtle) -->
  <path d="M 48 120 Q 128 160 208 120" fill="none" stroke="#B0A498" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <!-- Small lash details -->
  <line x1="88" y1="106" x2="82" y2="94" stroke="#C8A468" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="128" y1="100" x2="128" y2="87" stroke="#C8A468" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="168" y1="106" x2="174" y2="94" stroke="#C8A468" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- Text -->
  <text x="128" y="195" text-anchor="middle" font-family="sans-serif" font-weight="600" font-size="28" fill="#D8CCBC" letter-spacing="4">EyeRest</text>
</svg>
